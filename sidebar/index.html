<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Greenroom</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header id="status-bar">
      <span class="logo">GREENROOM</span>
      <div id="live-indicator" class="status-indicator">
        <span class="status-dot"></span>
        <span class="status-label">OFFLINE</span>
      </div>
    </header>

    <section id="transcript-strip">
      <div id="transcript-text">Waiting for audio...</div>
    </section>

    <main id="persona-container">
      <!-- Gary — Fact Checker -->
      <section class="persona-lane" data-persona="gary">
        <div class="persona-header">
          <img
            class="persona-avatar"
            src="assets/gary.png"
            alt=""
            onerror="this.style.display = 'none'"
          />
          <span class="persona-name">Gary</span>
          <span class="persona-role">Fact Checker</span>
        </div>
        <div class="persona-messages">
          <div class="message-bubble placeholder">Listening...</div>
        </div>
        <canvas class="sine-wave" data-persona="gary"></canvas>
      </section>

      <!-- Fred — Sound Engineer -->
      <section class="persona-lane" data-persona="fred">
        <div class="persona-header">
          <img
            class="persona-avatar"
            src="assets/fred.png"
            alt=""
            onerror="this.style.display = 'none'"
          />
          <span class="persona-name">Fred</span>
          <span class="persona-role">Sound Engineer</span>
          <button id="fred-mute" class="mute-toggle" title="Mute Fred">
            &#x1F50A;
          </button>
        </div>
        <div class="persona-messages">
          <div class="message-bubble placeholder">Listening...</div>
        </div>
        <canvas class="sine-wave" data-persona="fred"></canvas>
      </section>

      <!-- Jackie — Comedy Writer -->
      <section class="persona-lane" data-persona="jackie">
        <div class="persona-header">
          <img
            class="persona-avatar"
            src="assets/jackie.png"
            alt=""
            onerror="this.style.display = 'none'"
          />
          <span class="persona-name">Jackie</span>
          <span class="persona-role">Comedy Writer</span>
        </div>
        <div class="persona-messages">
          <div class="message-bubble placeholder">Listening...</div>
        </div>
        <canvas class="sine-wave" data-persona="jackie"></canvas>
      </section>

      <!-- The Troll -->
      <section class="persona-lane" data-persona="troll">
        <div class="persona-header">
          <img
            class="persona-avatar"
            src="assets/troll.png"
            alt=""
            onerror="this.style.display = 'none'"
          />
          <span class="persona-name">The Troll</span>
          <span class="persona-role">Chaos Agent</span>
        </div>
        <div class="persona-messages">
          <div class="message-bubble placeholder">Listening...</div>
        </div>
        <canvas class="sine-wave" data-persona="troll"></canvas>
      </section>
    </main>

    <footer id="controls">
      <button id="btn-settings" class="control-btn" title="Settings">
        &#x2699;
      </button>
      <button id="btn-pause" class="control-btn" title="Pause">&#x23F8;</button>
    </footer>

    <script src="sinewave.js"></script>
    <script src="personas.js"></script>
    <script src="app.js"></script>
  </body>
</html>
